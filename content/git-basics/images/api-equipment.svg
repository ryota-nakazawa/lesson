<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">APIはアプリに機能を装備させるイメージ</title>
  <desc id="desc">作りたてのアプリに、APIを通じてログイン、AIチャット、決済、通知などの機能が追加される図</desc>
  <rect width="1200" height="620" fill="#fbfaf7"/>
  <rect x="90" y="150" width="290" height="300" rx="34" fill="#ffffff" stroke="#6b7280" stroke-width="5"/>
  <text x="235" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#222831">作りたてのアプリ</text>
  <text x="235" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#626b78">まだ機能が少ない</text>
  <circle cx="235" cy="365" r="45" fill="#e5e7eb"/>
  <path d="M425 300 H545" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
  <path d="M535 278 L565 300 L535 322" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="610" y="120" width="480" height="360" rx="34" fill="#ffffff" stroke="#1f6feb" stroke-width="5"/>
  <text x="850" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">APIで機能を装備</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="675" y="235" width="160" height="72" rx="18" fill="#e8f3ff" stroke="#1f6feb" stroke-width="3"/>
    <text x="755" y="280" text-anchor="middle" fill="#183153">ログイン</text>
    <rect x="865" y="235" width="160" height="72" rx="18" fill="#f1ecff" stroke="#7c3aed" stroke-width="3"/>
    <text x="945" y="280" text-anchor="middle" fill="#3d245f">AIチャット</text>
    <rect x="675" y="335" width="160" height="72" rx="18" fill="#fff4df" stroke="#d97706" stroke-width="3"/>
    <text x="755" y="380" text-anchor="middle" fill="#5c3500">決済</text>
    <rect x="865" y="335" width="160" height="72" rx="18" fill="#e9f8ef" stroke="#2da44e" stroke-width="3"/>
    <text x="945" y="380" text-anchor="middle" fill="#1f3d2a">通知</text>
  </g>
  <text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#222831">一から全部作らなくても、必要な機能を組み合わせられる</text>
</svg>
