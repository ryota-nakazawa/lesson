<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">部屋の広さと家賃から見る関数近似</title>
  <desc id="desc">部屋の広さと家賃のデータ点に対して、予測線を近づける図</desc>

  <rect x="24" y="24" width="1152" height="732" rx="24" fill="#F8FAFC" stroke="#D8E2EF" stroke-width="2"/>
  <text x="600" y="82" text-anchor="middle" fill="#1F2937" font-family="sans-serif" font-size="40" font-weight="700">データに合う関数を近づけていく</text>
  <text x="600" y="122" text-anchor="middle" fill="#526174" font-family="sans-serif" font-size="22">例: 部屋の広さから家賃を予測する</text>

  <g transform="translate(92 160)">
    <rect x="0" y="0" width="690" height="470" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>

    <line x1="86" y1="348" x2="630" y2="348" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
    <line x1="86" y1="348" x2="86" y2="58" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
    <path d="M630 348 L614 338 L614 358 Z" fill="#334155"/>
    <path d="M86 58 L76 76 L96 76 Z" fill="#334155"/>

    <g stroke="#E2E8F0" stroke-width="2">
      <line x1="86" y1="290" x2="630" y2="290"/>
      <line x1="86" y1="232" x2="630" y2="232"/>
      <line x1="86" y1="174" x2="630" y2="174"/>
      <line x1="86" y1="116" x2="630" y2="116"/>
      <line x1="195" y1="58" x2="195" y2="348"/>
      <line x1="304" y1="58" x2="304" y2="348"/>
      <line x1="413" y1="58" x2="413" y2="348"/>
      <line x1="522" y1="58" x2="522" y2="348"/>
    </g>

    <text x="358" y="398" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="22" font-weight="700">部屋の広さ x</text>
    <text x="34" y="210" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="22" font-weight="700" transform="rotate(-90 34 210)">家賃 y</text>

    <path d="M124 318 L600 88" stroke="#BFDBFE" stroke-width="11" stroke-linecap="round" stroke-dasharray="24 18"/>

    <line x1="124" y1="306" x2="600" y2="112" stroke="#2563EB" stroke-width="9" stroke-linecap="round"/>

    <g fill="#F97316" stroke="#9A3412" stroke-width="3">
      <circle cx="136" cy="300" r="11"/>
      <circle cx="204" cy="270" r="11"/>
      <circle cx="274" cy="244" r="11"/>
      <circle cx="342" cy="213" r="11"/>
      <circle cx="420" cy="174" r="11"/>
      <circle cx="490" cy="144" r="11"/>
      <circle cx="558" cy="126" r="11"/>
    </g>

    <g transform="translate(72 410)">
      <rect x="0" y="0" width="546" height="40" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
      <circle cx="28" cy="20" r="8" fill="#F97316" stroke="#9A3412" stroke-width="2"/>
      <text x="46" y="27" fill="#9A3412" font-family="sans-serif" font-size="16" font-weight="700">実際のデータ</text>
      <line x1="174" y1="20" x2="248" y2="20" stroke="#BFDBFE" stroke-width="9" stroke-linecap="round" stroke-dasharray="16 12"/>
      <text x="262" y="27" fill="#1D4ED8" font-family="sans-serif" font-size="16" font-weight="700">調整前</text>
      <line x1="370" y1="20" x2="444" y2="20" stroke="#2563EB" stroke-width="9" stroke-linecap="round"/>
      <text x="458" y="27" fill="#1E3A8A" font-family="sans-serif" font-size="16" font-weight="700">学習後</text>
    </g>
  </g>

  <g transform="translate(830 180)">
    <rect x="0" y="0" width="280" height="78" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="3"/>
    <text x="140" y="33" text-anchor="middle" fill="#1E3A8A" font-family="sans-serif" font-size="22" font-weight="700">入力</text>
    <text x="140" y="60" text-anchor="middle" fill="#1F2937" font-family="sans-serif" font-size="19">部屋の広さ</text>

    <path d="M140 90 V124" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
    <path d="M126 110 L140 128 L154 110" fill="#64748B"/>

    <rect x="0" y="142" width="280" height="88" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="3"/>
    <text x="140" y="177" text-anchor="middle" fill="#166534" font-family="sans-serif" font-size="22" font-weight="700">モデル</text>
    <text x="140" y="207" text-anchor="middle" fill="#1F2937" font-family="sans-serif" font-size="19">家賃を予測する関数</text>

    <path d="M140 242 V276" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
    <path d="M126 262 L140 280 L154 262" fill="#64748B"/>

    <rect x="0" y="294" width="280" height="78" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="3"/>
    <text x="140" y="327" text-anchor="middle" fill="#9A3412" font-family="sans-serif" font-size="22" font-weight="700">出力</text>
    <text x="140" y="354" text-anchor="middle" fill="#1F2937" font-family="sans-serif" font-size="19">予測される家賃</text>

    <rect x="0" y="410" width="280" height="84" rx="14" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
    <text x="140" y="444" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="20" font-weight="700">誤差を小さくする</text>
    <text x="140" y="474" text-anchor="middle" fill="#526174" font-family="sans-serif" font-size="17">予測と実際の差で調整</text>
  </g>

  <rect x="160" y="690" width="880" height="44" rx="22" fill="#E2E8F0"/>
  <text x="600" y="718" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="19" font-weight="700">単純化すると、点に近い線を探すこと。実際には複数の入力を使って調整します。</text>
</svg>
