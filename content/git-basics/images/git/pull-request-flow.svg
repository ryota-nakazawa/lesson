<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Pull Requestとレビューの流れ</title>
  <desc id="desc">作業ブランチで変更し、Pull Requestを出し、レビュー後にmainへマージする流れを示す図</desc>
  <rect width="960" height="520" rx="22" fill="#f7f9fc"/>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2937">PRはmainへ入れる前の確認ポイント</text>
  <text x="480" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#607086">作業ブランチの変更を、レビューしてから本流へマージします</text>

  <line x1="120" y1="300" x2="840" y2="300" stroke="#b8c7da" stroke-width="7" stroke-linecap="round"/>
  <text x="92" y="306" text-anchor="end" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#344256">main</text>
  <circle cx="155" cy="300" r="22" fill="#ffffff" stroke="#7eaee9" stroke-width="4"/>
  <circle cx="805" cy="300" r="22" fill="#ffffff" stroke="#7eaee9" stroke-width="4"/>

  <path d="M240 300 C300 220 390 205 465 235" fill="none" stroke="#7fac77" stroke-width="5" stroke-linecap="round"/>
  <path d="M465 235 C520 255 560 278 600 300" fill="none" stroke="#7fac77" stroke-width="5" stroke-linecap="round" marker-end="url(#greenArrow)"/>
  <text x="318" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2f6332">作業ブランチ</text>
  <circle cx="330" cy="228" r="21" fill="#ffffff" stroke="#7fac77" stroke-width="4"/>
  <circle cx="430" cy="228" r="21" fill="#ffffff" stroke="#7fac77" stroke-width="4"/>

  <rect x="184" y="365" width="180" height="80" rx="16" fill="#ffffff" stroke="#c9d5e5" stroke-width="2"/>
  <text x="274" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2937">1. 変更する</text>
  <text x="274" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#56657a">作業ブランチで進める</text>

  <rect x="390" y="130" width="180" height="80" rx="16" fill="#eef6ff" stroke="#8ab8ed" stroke-width="2"/>
  <text x="480" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#24527a">2. PRを出す</text>
  <text x="480" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#56657a">変更を相談する</text>

  <rect x="596" y="130" width="180" height="80" rx="16" fill="#fff7df" stroke="#e6c864" stroke-width="2"/>
  <text x="686" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#876713">3. レビュー</text>
  <text x="686" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#56657a">第三者が確認する</text>

  <path d="M570 170 L596 170" stroke="#8fa0b4" stroke-width="3" stroke-linecap="round" marker-end="url(#grayArrow)"/>
  <path d="M686 212 C680 250 650 278 615 292" fill="none" stroke="#d4a72c" stroke-width="3" stroke-linecap="round" marker-end="url(#yellowArrow)"/>

  <rect x="620" y="365" width="180" height="80" rx="16" fill="#f0f7ef" stroke="#9bc58d" stroke-width="2"/>
  <text x="710" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2f6332">4. マージ</text>
  <text x="710" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#56657a">mainへ取り込む</text>

  <rect x="214" y="468" width="532" height="34" rx="17" fill="#e9eef6"/>
  <text x="480" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#344256">PRで確認してからマージすることで、mainを安定させやすくなります</text>

  <defs>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7fac77"/></marker>
    <marker id="grayArrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8fa0b4"/></marker>
    <marker id="yellowArrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#d4a72c"/></marker>
  </defs>
</svg>
