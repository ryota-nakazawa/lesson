<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">コンテナで環境をそろえるイメージ</title>
  <desc id="desc">船のコンテナのように、アプリ、ライブラリ、設定をひとまとめにして別の環境へ運ぶことで、環境差分を減らすイメージ。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow-gray" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L14 8 L2 14 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1400" height="760" rx="28" fill="#f8fafc"/>
  <text x="700" y="72" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="40" font-weight="800" fill="#1f2937">コンテナで環境をそろえる</text>
  <text x="700" y="116" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" fill="#526173">アプリ・ライブラリ・設定をひとまとめにして、別の場所でも動かしやすくします</text>

  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="90" y="190" width="360" height="350" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="270" y="235" text-anchor="middle" font-size="28" font-weight="800" fill="#334155">コンテナの中身</text>
    <rect x="140" y="275" width="260" height="58" rx="12" fill="#dbeafe" stroke="#7eb3f2" stroke-width="3"/>
    <text x="270" y="313" text-anchor="middle" font-size="23" font-weight="800" fill="#1f4f8f">アプリ</text>
    <rect x="140" y="350" width="260" height="58" rx="12" fill="#dcfce7" stroke="#86c58b" stroke-width="3"/>
    <text x="270" y="388" text-anchor="middle" font-size="23" font-weight="800" fill="#24633a">ライブラリ</text>
    <rect x="140" y="425" width="260" height="58" rx="12" fill="#fef3c7" stroke="#e7bd55" stroke-width="3"/>
    <text x="270" y="463" text-anchor="middle" font-size="23" font-weight="800" fill="#8a5b00">設定</text>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <path d="M520 372 C610 285 735 285 835 352" fill="none" stroke="#64748b" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-gray)"/>
    <text x="675" y="288" text-anchor="middle" font-size="24" font-weight="800" fill="#334155">コンテナとして運ぶ</text>
  </g>

  <g filter="url(#shadow)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <path d="M820 440 L1205 440 L1140 530 L875 530 Z" fill="#1f4f8f"/>
    <rect x="855" y="315" width="110" height="90" rx="8" fill="#60a5fa" stroke="#1f4f8f" stroke-width="3"/>
    <rect x="975" y="315" width="110" height="90" rx="8" fill="#34d399" stroke="#167442" stroke-width="3"/>
    <rect x="1095" y="315" width="110" height="90" rx="8" fill="#fbbf24" stroke="#a16207" stroke-width="3"/>
    <line x1="875" y1="330" x2="945" y2="330" stroke="#dbeafe" stroke-width="4"/>
    <line x1="995" y1="330" x2="1065" y2="330" stroke="#dcfce7" stroke-width="4"/>
    <line x1="1115" y1="330" x2="1185" y2="330" stroke="#fef3c7" stroke-width="4"/>
    <text x="1030" y="590" text-anchor="middle" font-size="26" font-weight="800" fill="#334155">別のPC・サーバーへ移しても同じように動かしやすい</text>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="205" y="605" width="990" height="68" rx="22" fill="#e2e8f0"/>
    <text x="700" y="648" text-anchor="middle" font-size="25" font-weight="800" fill="#334155">Dockerは、このコンテナを扱うための代表的な技術です</text>
  </g>
</svg>
