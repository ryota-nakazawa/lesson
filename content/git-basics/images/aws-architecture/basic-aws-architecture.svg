<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">AWSで見るインフラ構成の例</title>
  <desc id="desc">利用者からVPC内のALB、EC2、API Gateway、Lambda、RDS、S3へ処理が流れ、IAM、Security Group、CloudWatchが権限、通信、監視を支える構成図。</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L12 7 L2 12 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1440" height="900" rx="28" fill="#f8fafc"/>
  <text x="720" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="38" font-weight="800" fill="#1f2937">AWSで見るインフラ構成の例</text>
  <text x="720" y="96" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" fill="#526173">入口、実行場所、データ保存、権限、通信制御、監視を分けて考える</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="70" y="160" width="1300" height="610" rx="26" fill="#eef6ff" stroke="#94a3b8" stroke-width="3"/>
    <text x="105" y="205" font-size="28" font-weight="800" fill="#1e3a8a">VPC</text>
    <text x="170" y="205" font-size="18" fill="#475569">AWS上の専用ネットワーク</text>

    <g filter="url(#shadow)">
      <rect x="120" y="300" width="150" height="86" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
      <text x="195" y="335" text-anchor="middle" font-size="23" font-weight="800" fill="#1f2937">利用者</text>
      <text x="195" y="364" text-anchor="middle" font-size="16" fill="#64748b">ブラウザ・アプリ</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="350" y="245" width="190" height="86" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
      <text x="445" y="279" text-anchor="middle" font-size="22" font-weight="800" fill="#9a3412">ALB</text>
      <text x="445" y="307" text-anchor="middle" font-size="15" fill="#64748b">Webの入口</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="350" y="405" width="190" height="86" rx="14" fill="#fefce8" stroke="#eab308" stroke-width="3"/>
      <text x="445" y="439" text-anchor="middle" font-size="22" font-weight="800" fill="#854d0e">API Gateway</text>
      <text x="445" y="467" text-anchor="middle" font-size="15" fill="#64748b">APIの入口</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="620" y="245" width="190" height="86" rx="14" fill="#ecfdf5" stroke="#34d399" stroke-width="3"/>
      <text x="715" y="279" text-anchor="middle" font-size="22" font-weight="800" fill="#166534">EC2</text>
      <text x="715" y="307" text-anchor="middle" font-size="15" fill="#64748b">アプリを動かす</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="620" y="405" width="190" height="86" rx="14" fill="#f5f3ff" stroke="#a78bfa" stroke-width="3"/>
      <text x="715" y="439" text-anchor="middle" font-size="22" font-weight="800" fill="#5b21b6">Lambda</text>
      <text x="715" y="467" text-anchor="middle" font-size="15" fill="#64748b">処理を実行</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="900" y="245" width="190" height="86" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/>
      <text x="995" y="279" text-anchor="middle" font-size="22" font-weight="800" fill="#1d4ed8">RDS / DB</text>
      <text x="995" y="307" text-anchor="middle" font-size="15" fill="#64748b">構造化データ</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="900" y="405" width="190" height="86" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
      <text x="995" y="439" text-anchor="middle" font-size="22" font-weight="800" fill="#15803d">S3</text>
      <text x="995" y="467" text-anchor="middle" font-size="15" fill="#64748b">画像・ファイル</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="1160" y="245" width="150" height="86" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
      <text x="1235" y="279" text-anchor="middle" font-size="22" font-weight="800" fill="#334155">CloudWatch</text>
      <text x="1235" y="307" text-anchor="middle" font-size="15" fill="#64748b">ログ・監視</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="200" y="610" width="240" height="86" rx="14" fill="#fff1f2" stroke="#fb7185" stroke-width="3"/>
      <text x="320" y="644" text-anchor="middle" font-size="22" font-weight="800" fill="#be123c">Security Group</text>
      <text x="320" y="672" text-anchor="middle" font-size="15" fill="#64748b">通信の入口・出口を制御</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="520" y="610" width="240" height="86" rx="14" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
      <text x="640" y="644" text-anchor="middle" font-size="22" font-weight="800" fill="#334155">IAM</text>
      <text x="640" y="672" text-anchor="middle" font-size="15" fill="#64748b">誰が何をできるか</text>
    </g>

    <path d="M270 343 L340 292" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M270 350 L340 438" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M540 288 L610 288" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M540 448 L610 448" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M810 288 L890 288" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M810 448 L890 448" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <path d="M810 300 C920 365 915 420 890 440" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M1090 288 L1150 288" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M1090 448 C1160 420 1200 365 1225 335" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <rect x="200" y="800" width="1040" height="54" rx="20" fill="#e2e8f0"/>
    <text x="720" y="835" text-anchor="middle" font-size="20" font-weight="700" fill="#334155">Security Groupは通信、IAMは権限、CloudWatchは状態確認を支えます</text>
  </g>
</svg>
